name: 🚀 KOBE Corporation Pricing CI/CD

# ==========================================
# DÉCLENCHEMENT
# ==========================================
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

# ==========================================
# PERMISSIONS
# ==========================================
permissions:
  contents: write
  packages: write

# ==========================================
# VARIABLES GLOBALES
# ==========================================
env:
  DOCKER_IMAGE: azerty78/pricing-kobecorp
  DOCKERFILE_PATH: setup-pricing/Dockerfile
  DOCKER_CONTEXT: .

# ==========================================
# JOBS
# ==========================================
jobs:
  # ==========================================
  # JOB 1: Create Git Tags
  # ==========================================
  tags:
    name: 🏷️ Create Git Tags
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_created: ${{ steps.finalize.outputs.created }}
      tag_name: ${{ steps.finalize.outputs.name }}
      tag_type: ${{ steps.finalize.outputs.type }}
      is_release: ${{ steps.finalize.outputs.is_release }}
      semantic_version: ${{ steps.finalize.outputs.semantic_version }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 📋 Extract Version & Info
        id: version
        run: |
          echo "✅ Informations sur les tags Git"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📌 Ref: ${{ github.ref }}"
          echo "🔖 SHA: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "👤 Auteur: $(git log -1 --pretty=%an)"
          echo "📅 Date: $(git log -1 --pretty=%cd --date=format:%Y-%m-%d\ %H:%M:%S)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ -f "package.json" ]; then
            PACKAGE_VERSION=$(grep -m 1 '"version"' package.json | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
            if [ -z "$PACKAGE_VERSION" ]; then
              PACKAGE_VERSION="0.0.0"
            fi
            echo "📦 Version package.json: $PACKAGE_VERSION"
            echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          else
            echo "⚠️ package.json non trouvé"
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          fi

          echo ""
          echo "📋 Tags existants (10 derniers):"
          git tag -l --sort=-version:refname | head -10 || echo "  Aucun tag trouvé"
          echo ""
          echo "📝 Dernier commit:"
          echo "  SHA: $(git log -1 --pretty=%H)"
          COMMIT_MSG_FIRST_LINE=$(git log -1 --pretty=%B | head -n 1)
          echo "  Message: $COMMIT_MSG_FIRST_LINE"

      - name: 📊 Analyze Changes
        id: changes
        run: |
          echo "📊 Analyse des changements:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            FILES_CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | wc -l)
            echo "📁 Fichiers modifiés: $FILES_CHANGED"
            echo ""
            git diff --name-status ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | awk '{print "  " $1 " " $2}' | head -20 || true
          else
            PREV_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
            if [ -n "$PREV_SHA" ]; then
              FILES_CHANGED=$(git diff --name-only $PREV_SHA ${{ github.sha }} | wc -l)
              echo "📁 Fichiers modifiés: $FILES_CHANGED"
              echo ""
              git diff --name-status $PREV_SHA ${{ github.sha }} | awk '{print "  " $1 " " $2}' | head -20 || true
            else
              echo "ℹ️ Premier commit de la branche"
            fi
          fi

          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qiE "^(feat|feature)"; then
            CHANGE_TYPE="✨ Feature"
          elif echo "$COMMIT_MSG" | grep -qiE "^(fix|bugfix)"; then
            CHANGE_TYPE="🐛 Fix"
          elif echo "$COMMIT_MSG" | grep -qiE "^(refactor)"; then
            CHANGE_TYPE="♻️ Refactor"
          elif echo "$COMMIT_MSG" | grep -qiE "^(docs|documentation)"; then
            CHANGE_TYPE="📚 Documentation"
          elif echo "$COMMIT_MSG" | grep -qiE "^(test)"; then
            CHANGE_TYPE="🧪 Test"
          elif echo "$COMMIT_MSG" | grep -qiE "^(chore)"; then
            CHANGE_TYPE="🔧 Chore"
          else
            CHANGE_TYPE="📝 Update"
          fi
          echo ""
          echo "🏷️ Type de changement: $CHANGE_TYPE"
          echo "change_type=$CHANGE_TYPE" >> $GITHUB_OUTPUT

      - name: 🏷️ Create Git Tag
        id: tag
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG=$(git log -1 --pretty=%B)
          AUTHOR=$(git log -1 --pretty=%an)
          DATE=$(git log -1 --pretty=%cd --date=format:%Y-%m-%d\ %H:%M:%S)
          SHORT_SHA=$(echo $SHA | cut -c1-7)
          CHANGE_TYPE="${{ steps.changes.outputs.change_type }}"

          if [ "$VERSION" = "0.0.0" ]; then
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            TAG_NAME="dev-${SHORT_SHA}-${TIMESTAMP}"
            TAG_TYPE="development"
            echo "🔧 Tag de développement: $TAG_NAME"
          else
            TAG_NAME="v${VERSION}"
            TAG_TYPE="semantic"
            if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              TIMESTAMP=$(date +%Y%m%d%H%M%S)
              TAG_NAME="dev-${SHORT_SHA}-${TIMESTAMP}"
              TAG_TYPE="development"
              echo "ℹ️ Tag sémantique existant, utilisation d'un tag dev"
            else
              echo "🎉 Tag sémantique: $TAG_NAME"
            fi
          fi

          TAG_MESSAGE="Release $TAG_NAME - Version: $VERSION - Commit: $SHA - Branch: $BRANCH - Auteur: $AUTHOR - Date: $DATE - Type: $TAG_TYPE - Changement: $CHANGE_TYPE - Message: $COMMIT_MSG"
          git tag -a "$TAG_NAME" -m "$TAG_MESSAGE" "$SHA"

          echo "name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "created=true" >> $GITHUB_OUTPUT
          echo "type=$TAG_TYPE" >> $GITHUB_OUTPUT
          if [ "$VERSION" != "0.0.0" ] && [ "$TAG_TYPE" = "semantic" ]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "semantic_version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "semantic_version=" >> $GITHUB_OUTPUT
          fi

      - name: 📋 Finalize Tag Outputs
        id: finalize
        if: always()
        run: |
          if [ "${{ steps.tag.outputs.created }}" != "true" ]; then
            echo "name=" >> $GITHUB_OUTPUT
            echo "created=false" >> $GITHUB_OUTPUT
            echo "type=" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "semantic_version=" >> $GITHUB_OUTPUT
          else
            echo "name=${{ steps.tag.outputs.name }}" >> $GITHUB_OUTPUT
            echo "created=${{ steps.tag.outputs.created }}" >> $GITHUB_OUTPUT
            echo "type=${{ steps.tag.outputs.type }}" >> $GITHUB_OUTPUT
            echo "is_release=${{ steps.tag.outputs.is_release }}" >> $GITHUB_OUTPUT
            echo "semantic_version=${{ steps.tag.outputs.semantic_version }}" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Push Tags
        if: steps.tag.outputs.created == 'true'
        run: |
          TAG_NAME="${{ steps.tag.outputs.name }}"
          git push origin "$TAG_NAME" || { echo "⚠️ Tag peut déjà exister"; exit 0; }
          echo "✅ Tag $TAG_NAME poussé"

      - name: 📋 Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 RÉSUMÉ TAGS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Version: ${{ steps.version.outputs.version }}"
          if [ "${{ steps.tag.outputs.created }}" == "true" ]; then
            echo "✅ Tag: ${{ steps.tag.outputs.name }} (${{ steps.tag.outputs.type }})"
          else
            echo "ℹ️ Aucun tag créé"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ==========================================
  # JOB 2: Build Docker Image
  # ==========================================
  build:
    needs: tags
    name: 🔨 Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧹 Setup Docker Properly
        run: |
          rm -rf ~/.docker/buildx 2>/dev/null || true
          rm -rf ~/.docker/contexts 2>/dev/null || true
          mkdir -p ~/.docker/contexts/meta
          CONTEXT_DIR=~/.docker/contexts/meta/cdb4ee2aea69cc6a83331bbe96dc2caa9a299d21329efb0336fc02a82e1839a8
          mkdir -p "$CONTEXT_DIR"
          cat > "$CONTEXT_DIR/meta.json" <<'EOF'
          {
            "Name": ".",
            "Metadata": { "Description": "Default context" },
            "Endpoints": {
              "docker": { "Host": "unix:///var/run/docker.sock", "SkipTLSVerify": false }
            }
          }
          EOF
          [ -f "$CONTEXT_DIR/meta.json" ] && echo "✅ Contexte Docker créé" || exit 1

      - name: 🔐 Login to DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker pull node:22.13.1-alpine || { cat ~/.docker/config.json 2>/dev/null; exit 1; }
          echo "✅ Login DockerHub réussi"

      - name: 📋 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ needs.tags.outputs.tag_name }},enable=${{ needs.tags.outputs.tag_created == 'true' && needs.tags.outputs.tag_name != '' }}
            type=semver,pattern={{version}},enable=${{ needs.tags.outputs.is_release == 'true' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.tags.outputs.is_release == 'true' }}
            type=ref,event=branch
            type=sha,prefix=${{ github.ref_name }}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=ref,event=pr

      - name: 📄 Load environment variables
        id: env
        run: |
          extract_env_var() {
            local var_name=$1
            local file_path=$2
            if [ -f "$file_path" ]; then
              grep -E "^${var_name}=" "$file_path" | sed -E "s/^${var_name}=['\"]?([^'\"]*)['\"]?$/\1/" | head -1 | xargs || echo ""
            else
              echo ""
            fi
          }

          if [ -f "setup-pricing/.env" ]; then
            echo "✅ Fichier setup-pricing/.env trouvé"

            VITE_EMAILJS_PUBLIC_KEY=$(extract_env_var "VITE_EMAILJS_PUBLIC_KEY" "setup-pricing/.env")
            VITE_EMAILJS_SERVICE_ID=$(extract_env_var "VITE_EMAILJS_SERVICE_ID" "setup-pricing/.env")
            VITE_EMAILJS_CONTACT_TEMPLATE_ID=$(extract_env_var "VITE_EMAILJS_CONTACT_TEMPLATE_ID" "setup-pricing/.env")
            VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID=$(extract_env_var "VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID" "setup-pricing/.env")
            VITE_APP_NAME=$(extract_env_var "VITE_APP_NAME" "setup-pricing/.env")
            VITE_APP_URL=$(extract_env_var "VITE_APP_URL" "setup-pricing/.env")

            [ -z "$VITE_APP_NAME" ] && VITE_APP_NAME=$(extract_env_var "APP_NAME" "setup-pricing/.env")
            [ -z "$VITE_APP_URL" ] && VITE_APP_URL=$(extract_env_var "APP_URL" "setup-pricing/.env")
            [ -z "$VITE_APP_NAME" ] && VITE_APP_NAME="KOBE Corporation Pricing"
            [ -z "$VITE_APP_URL" ] && VITE_APP_URL="https://pricing.kobecorporation.com"

            echo "VITE_EMAILJS_PUBLIC_KEY=${VITE_EMAILJS_PUBLIC_KEY:0:10}..." 2>/dev/null || echo "VITE_EMAILJS_PUBLIC_KEY=(vide)"
            echo "VITE_APP_NAME=$VITE_APP_NAME"
            echo "VITE_APP_URL=$VITE_APP_URL"

            echo "VITE_EMAILJS_PUBLIC_KEY=${VITE_EMAILJS_PUBLIC_KEY}" >> $GITHUB_ENV
            echo "VITE_EMAILJS_SERVICE_ID=${VITE_EMAILJS_SERVICE_ID}" >> $GITHUB_ENV
            echo "VITE_EMAILJS_CONTACT_TEMPLATE_ID=${VITE_EMAILJS_CONTACT_TEMPLATE_ID}" >> $GITHUB_ENV
            echo "VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID=${VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID}" >> $GITHUB_ENV
            echo "VITE_APP_NAME=${VITE_APP_NAME}" >> $GITHUB_ENV
            echo "VITE_APP_URL=${VITE_APP_URL}" >> $GITHUB_ENV
          else
            echo "⚠️ setup-pricing/.env non trouvé, valeurs par défaut"
            echo "VITE_EMAILJS_PUBLIC_KEY=" >> $GITHUB_ENV
            echo "VITE_EMAILJS_SERVICE_ID=" >> $GITHUB_ENV
            echo "VITE_EMAILJS_CONTACT_TEMPLATE_ID=" >> $GITHUB_ENV
            echo "VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID=" >> $GITHUB_ENV
            echo "VITE_APP_NAME=KOBE Corporation Pricing" >> $GITHUB_ENV
            echo "VITE_APP_URL=https://pricing.kobecorporation.com" >> $GITHUB_ENV
          fi

      - name: 🔨 Build Docker Image
        env:
          DOCKER_BUILDKIT: 0
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          if [ -z "$TAGS" ]; then
            TAGS="${{ env.DOCKER_IMAGE }}:latest ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          fi

          TAG_ARGS=""
          for tag in $TAGS; do
            if [ -n "$tag" ] && [ "${tag#-}" = "$tag" ] && echo "$tag" | grep -qE '^[^:]+:[^:]+$'; then
              TAG_ARGS="$TAG_ARGS --tag $tag"
            fi
          done
          [ -z "$TAG_ARGS" ] && TAG_ARGS="--tag ${{ env.DOCKER_IMAGE }}:latest"

          docker build \
            --pull \
            --file ${{ env.DOCKERFILE_PATH }} \
            $TAG_ARGS \
            --build-arg VITE_EMAILJS_PUBLIC_KEY="${VITE_EMAILJS_PUBLIC_KEY}" \
            --build-arg VITE_EMAILJS_SERVICE_ID="${VITE_EMAILJS_SERVICE_ID}" \
            --build-arg VITE_EMAILJS_CONTACT_TEMPLATE_ID="${VITE_EMAILJS_CONTACT_TEMPLATE_ID}" \
            --build-arg VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID="${VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID}" \
            --build-arg VITE_APP_NAME="${VITE_APP_NAME}" \
            --build-arg VITE_APP_URL="${VITE_APP_URL}" \
            ${{ env.DOCKER_CONTEXT }}

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            for tag in $TAGS; do
              if [ -n "$tag" ] && [ "${tag#-}" = "$tag" ] && echo "$tag" | grep -qE '^[^:]+:[^:]+$'; then
                echo "Pushing $tag..."
                docker push "$tag" || echo "⚠️ Erreur push $tag"
              fi
            done
          fi

      - name: 📊 Image Info
        if: success()
        run: |
          echo "✅ Image buildée avec succès!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}"
          echo "🏷️  Tags: ${{ steps.meta.outputs.tags }}"
          docker images | grep "${{ env.DOCKER_IMAGE }}" || true

  # ==========================================
  # JOB 3: Test Docker Image
  # ==========================================
  test:
    name: 🧪 Test Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && needs.build.result == 'success'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧹 Setup Docker Properly
        run: |
          rm -rf ~/.docker/buildx 2>/dev/null || true
          rm -rf ~/.docker/contexts 2>/dev/null || true
          mkdir -p ~/.docker/contexts/meta
          CONTEXT_DIR=~/.docker/contexts/meta/cdb4ee2aea69cc6a83331bbe96dc2caa9a299d21329efb0336fc02a82e1839a8
          mkdir -p "$CONTEXT_DIR"
          cat > "$CONTEXT_DIR/meta.json" <<'EOF'
          {
            "Name": ".",
            "Metadata": { "Description": "Default context" },
            "Endpoints": {
              "docker": { "Host": "unix:///var/run/docker.sock", "SkipTLSVerify": false }
            }
          }
          EOF

      - name: 🔐 Login to DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          echo "✅ Login DockerHub réussi"

      - name: 🐳 Pull Docker Image
        run: |
          docker pull ${{ env.DOCKER_IMAGE }}:latest || echo "Image non trouvée, skip test"

      - name: ✅ Test Container Start
        run: |
          docker run -d --name pricing-kobecorp-test -p 8080:80 ${{ env.DOCKER_IMAGE }}:latest || exit 0
          sleep 5
          curl -f http://localhost:8080 || exit 1
          echo "✅ Conteneur démarré avec succès!"
          docker stop pricing-kobecorp-test
          docker rm pricing-kobecorp-test

  # ==========================================
  # JOB 4: Create GitHub Release
  # ==========================================
  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [tags, build]
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.tags.outputs.tag_created == 'true' &&
      needs.build.result == 'success'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Verify Tag Exists
        run: |
          TAG_NAME="${{ needs.tags.outputs.tag_name }}"
          git fetch --tags
          git rev-parse "$TAG_NAME" >/dev/null 2>&1 || git fetch origin tag "$TAG_NAME" || exit 1
          echo "✅ Tag $TAG_NAME trouvé"
          git show "$TAG_NAME" --no-patch --format="  SHA: %H%n  Auteur: %an%n  Date: %ad" || true

      - name: 📋 Generate Release Notes
        id: release_notes
        run: |
          TAG_NAME="${{ needs.tags.outputs.tag_name }}"
          VERSION="${{ needs.tags.outputs.semantic_version }}"
          TAG_TYPE="${{ needs.tags.outputs.tag_type }}"
          IS_RELEASE="${{ needs.tags.outputs.is_release }}"

          if [ "$IS_RELEASE" = "true" ] && [ -n "$VERSION" ]; then
            RELEASE_TYPE="🎉 Release Sémantique"
            IS_PRERELEASE="false"
            LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*" 2>/dev/null || echo "")
            [ -n "$LAST_TAG" ] && COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges) || COMMITS=$(git log -10 --pretty=format:"- %s (%h)" --no-merges)
          else
            RELEASE_TYPE="🔧 Release de Développement"
            IS_PRERELEASE="true"
            COMMITS=$(git log -10 --pretty=format:"- %s (%h)" --no-merges)
          fi

          {
            if [ "$IS_RELEASE" = "true" ] && [ -n "$VERSION" ]; then
              echo "## $RELEASE_TYPE"
              echo ""
              echo "**Version:** $VERSION | **Tag:** $TAG_NAME | **Type:** $TAG_TYPE"
              echo ""
              echo "### 📦 Image Docker"
              echo "\`\`\`"
              echo "docker pull ${{ env.DOCKER_IMAGE }}:$TAG_NAME"
              echo "docker pull ${{ env.DOCKER_IMAGE }}:latest"
              echo "\`\`\`"
            else
              echo "## $RELEASE_TYPE"
              echo ""
              echo "**Tag:** $TAG_NAME | **Type:** $TAG_TYPE"
              echo ""
              echo "### 📦 Image Docker"
              echo "\`\`\`"
              echo "docker pull ${{ env.DOCKER_IMAGE }}:$TAG_NAME"
              echo "\`\`\`"
            fi
            echo ""
            echo "### 📝 Changements"
            echo "$COMMITS"
            echo ""
            echo "### 🔗 Liens"
            echo "- **Docker Hub:** https://hub.docker.com/r/${{ env.DOCKER_IMAGE }}"
            echo "- **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
            echo ""
            echo "---"
            echo "*Généré par GitHub Actions*"
          } > release_notes.md
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.tags.outputs.tag_name }}
          name: Release ${{ needs.tags.outputs.tag_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ steps.release_notes.outputs.is_prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false
