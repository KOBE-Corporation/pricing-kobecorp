services:
  web:
    image: azerty78/pricing-kobecorp:latest
    container_name: pricing-kobecorp
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - NODE_ENV=production
    networks:
      - kobecorp-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  kobecorp-network:
    name: kobecorp-network
    external: true
