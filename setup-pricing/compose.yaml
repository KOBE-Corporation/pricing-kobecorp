services:
  web:
    build:
      context: ..
      dockerfile: setup-pricing/Dockerfile
    image: pricing-kobecorp:latest
    container_name: pricing-kobecorp
    restart: unless-stopped
    # Ne pas exposer de port directement sur l'hôte.
    # Le reverse proxy (externe) prend en charge les ports 80/443.
    expose:
      - "80"
    environment:
      - NODE_ENV=production
    networks:
      - kobecorp-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  kobecorp-network:
    name: kobecorp-network
    external: true

