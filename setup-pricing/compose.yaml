services:
  web:
    image: azerty78/pricing-kobecorp:latest
    container_name: pricing-kobecorp
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - NODE_ENV=production
    networks:
      - kobecorp-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  kobecorp-network:
    name: kobecorp-network
    external: true
